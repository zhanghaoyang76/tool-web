about:
  content: >
    # Sobre IT-Tools

    ## Tecnologías

    IT-Tools está desarrollado con Vue.js (Vue 3) y la biblioteca de componentes Naive UI, y está alojado y desplegado continuamente por Vercel. Algunas herramientas utilizan bibliotecas de código abierto de terceros. Puede encontrar la lista completa en el archivo package.json del repositorio.

    ## ¿Encontraste un error? ¿Falta una herramienta?

    Si la herramienta que necesita no está disponible aquí actualmente y cree que podría ser útil, puede enviar una solicitud de nueva funcionalidad en el repositorio de GitHub.

    Si encuentra un error, o algo no funciona como se esperaba, envíe un reporte de error en el repositorio de GitHub.

