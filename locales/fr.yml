about:
  content: >
    # À propos de IT-Tools

    ## Technologies

    IT-Tools est développé avec Vue.js (Vue 3) et la bibliothèque de composants Naive UI, et il est hébergé et déployé en continu par Vercel. Certains outils utilisent des bibliothèques open source tierces. Vous pouvez trouver la liste complète dans le fichier package.json du dépôt.

    ## Vous avez trouvé un bug ? Un outil manque ?

    Si l'outil dont vous avez besoin n'est pas encore disponible ici et que vous pensez qu'il pourrait être utile, vous pouvez soumettre une demande de fonctionnalité dans le dépôt GitHub.

    Si vous trouvez un bug, ou si quelque chose ne fonctionne pas comme prévu, veuillez soumettre un rapport de bug dans le dépôt GitHub.

