about:
  content: >
    # Sobre o IT-Tools

    ## Tecnologias

    O IT-Tools é desenvolvido com Vue.js (Vue 3) e a biblioteca de componentes Naive UI, e é hospedado e implantado continuamente pela Vercel. Algumas ferramentas usam bibliotecas de código aberto de terceiros. Você pode encontrar a lista completa no arquivo package.json do repositório.

    ## Encontrou um bug? Está faltando uma ferramenta?

    Se a ferramenta de que você precisa ainda não está disponível aqui e você acha que ela pode ser útil, fique à vontade para enviar uma solicitação de nova funcionalidade no repositório do GitHub.

    Se você encontrar um bug, ou algo não funcionar como esperado, envie um relatório de bug no repositório do GitHub.

